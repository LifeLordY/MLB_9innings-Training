<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MLB9局職棒-球員訓練</title>

    <style>
        /* --- 1. 網頁背景設定 --- */
        body {
            background-color: #0f0f0f; /* 深色背景 */
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- 2. 固定大小、圓角的長方形主容器 --- */
        .container {
            width: 600px; 
            min-height: 500px; 
            background-color: #1f1f1f; 
            border-radius: 20px; 
            margin: 20px auto; 
            padding: 20px;
            box-sizing: border-box; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
        }

        /* --- 3. 標題設定 --- */
        h1 {
            text-align: center; 
            margin-top: 0;
            margin-bottom: 20px; 
            color: #ffffff;
            font-size: 32px;
        }

        /* --- 4. 嚴格不換排的橫排設定 (用於選項) --- */
        .row {
            display: flex; 
            flex-wrap: nowrap; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            background-color: #3f3f3f; 
            padding: 10px;
            border-radius: 10px; /* 這個是選項區塊的圓角，不影響下方的表格 */
        }

        /* --- 5. 文字標籤與下拉選單樣式 --- */
        label {
            font-size: 16px;
            font-weight: bold;
        }

        select {
            padding: 10px 10px;
            font-size: 14px;
            border-radius: 5px;
            border: 2px solid #3f3f3f;
            background-color: #1f1f1f;
            color: white;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: #ffffff;
        }

        /* --- 6. 數據表格樣式 (無圓角) --- */
        table {
            width: 100%; /* 讓表格寬度填滿容器 */
            margin-top: 20px; /* 與上方的選項區塊保持距離 */
            border-collapse: collapse; /* 這是關鍵：讓表格邊框合併，呈現標準的直角表格，不會有預設的空隙 */
            border-radius: 0; /* 確保無圓角 */
            background-color: #1f1f1f;
        }

        th, td {
            border: 1px solid #7f7f7f; /* 表格的格線顏色 */
            padding: 10px; /* 儲存格內的留白 */
            text-align: center; /* 文字置中 */
        }

        th {
            background-color: #3f3f3f; /* 表頭底色 */
            color: #ffffff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>MLB9局職棒-球員訓練</h1>

        <div class="row">
            <label>球隊: </label>
            <select id="team-select">
                <option value="">請選擇球隊...</option>
                <option value="NYY">NYY</option>
                <option value="ATH">ATH</option>
                <option value="HOU">HOU</option>
                <option value="WSH">WSH</option>
                <option value="STL">STL</option>
                <option value="LAD">LAD</option>
                <option value="SD">SD</option>
            </select>

            <div style="width: 10px;"></div> 

            <label>類型: </label>
            <select id="type-select">
                <option value="regular">一般</option>
                <option value="vintage">經典</option>
                <option value="prime">全盛</option>
                <option value="signature">簽名</option>
                <option value="legend">傳說</option>
                <option value="supreme">史詩</option>
            </select>

            <div style="width: 10px;"></div> 

            <label>位置: </label>
            <select id="position-select"> <option value="">請選擇位置...</option>
                <optgroup label="打者">
                    <option value="C">C</option>
                    <option value="1B">1B</option>
                    <option value="2B">2B</option>
                    <option value="3B">3B</option>
                    <option value="SS">SS</option>
                    <option value="OF">OF</option>
                    <option value="DH">DH</option>
                </optgroup> <optgroup label="投手">
                    <option value="SP">SP</option>
                    <option value="RP">RP</option>
                    <option value="CP">CP</option>
                </optgroup> </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>球員名稱</th>
                    <th>力量</th>
                    <th>打擊</th>
                    <th>選球</th>
                    <th>速度</th>
                    <th>守備</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>測試球員 A</td>
                    <td>85</td>
                    <td>90</td>
                    <td>80</td>
                    <td>75</td>
                    <td>82</td>
                </tr>
                <tr>
                    <td>測試球員 B</td>
                    <td>92</td>
                    <td>88</td>
                    <td>78</td>
                    <td>60</td>
                    <td>70</td>
                </tr>
            </tbody>
        </table>

    </div>

</body>
</html>
