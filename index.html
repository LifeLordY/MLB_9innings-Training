<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB9局職棒-球員訓練</title>

    <style>
        /* --- 1. 網頁背景設定 --- */
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- 2. 固定大小、圓角的長方形主容器 --- */
        .container {
            width: 600px; 
            min-height: 600px; 
            background-color: #1f1f1f; 
            border-radius: 20px; 
            margin: 20px auto; 
            padding: 20px;
            box-sizing: border-box; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
        }

        /* --- 3. 標題設定 --- */
        h1 {
            text-align: center; 
            margin-top: 0;
            margin-bottom: 10px; 
            color: #ffffff;
            font-size: 28px;
        }

        /* --- 4. 嚴格不換排的橫排設定 (用於選項) --- */
        .row {
            display: flex; 
            flex-wrap: nowrap; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            background-color: #3f3f3f; 
            padding: 5px;
            border-radius: 10px;
        }

        /* --- 5. 文字標籤與下拉選單樣式 --- */
        label {
            font-size: 16px;
        }

        /* 針對上方獨立選項列的選單 */
        .row select {
            padding: 10px 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 2px solid #3f3f3f;
            background-color: #2f2f2f;
            color: white;
            cursor: pointer;
            outline: none;
        }

        .row select:focus {
            border-color: #ffffff;
        }

        /* --- 6. 數據表格樣式 --- */
        table {
            width: 100%; 
            margin-top: 10px; 
            border-collapse: collapse; 
            border-radius: 0; 
            background-color: #1f1f1f;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid #7f7f7f; 
            padding: 5px; 
            font-size: 14px; 
            text-align: center; 
            vertical-align: middle; /* 讓內容垂直置中 */
        }

        th {
            background-color: #00001f; 
            color: #ffffff;
            font-weight: bold;
            font-size: 16px;
            height: 30px;
        }

        /* --- 7. 表格內部專用元件樣式 --- */
        
        /* 讓表格內的選單和數字輸入框自動填滿，並符合深色主題 */
        table select, table input[type="number"] {
            width: 100%;
            padding: 3px;
            font-size: 14px;
            border-radius: 3px;
            border: 1px solid #3f3f3f;
            background-color: #2f2f2f;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        table select:focus, table input[type="number"]:focus {
            border-color: #ffffff;
        }

        /* 稍微放大勾選框，讓游標移上去會變成手指圖案 */
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* --- 8. 客製化列樣式 (新增) --- */
        
        .summary-row td {
            background-color: #00001f;
            color: #ffffff;
            font-weight: bold;
            font-size: 16px;
            height: 30px;
        }

        .spacer-row td {
            height: 5px; /* 空隙的高度 */
            border: none; /* 移除邊框 */
            padding: 0; /* 強制取消留白 */
            line-height: 0; /* 強制取消隱形文字的行高 */
            background-color: #1f1f1f; /* 與主容器底色融合 */
        }

        /* --- 9. 新增：彈出視窗與按鈕樣式 --- */
        
        /* 觸發彈出視窗的按鈕 */
        .setting-btn {
            background-color: #3f3f3f;
            color: white;
            padding: 3px 3px;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 3px;
        }

        .setting-btn:hover {
            background-color: #5f5f5f;
        }

        /* 彈出視窗背景 (覆蓋全螢幕的黑色半透明遮罩) */
        .modal-overlay {
            /* 🌟 測試排版時，請把下面這行改成 display: flex; 就能看見視窗了 */
            display: flex; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000; /* 確保它在最上層 */
        }

        /* 彈出視窗本體面板 */
        .modal-content {
            background-color: #1f1f1f;
            width: 600px; /* 視窗寬度，可依需求調整 */
            padding: 20px;
            border-radius: 20px;
            box-sizing: border-box; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 1px solid #3f3f3f;
        }

        .modal-content h2 {
            margin-top: 0;
            text-align: center;
            font-size: 24px;
            color: #ffffff;
        }

        /* 置右的按鈕容器 */
        .modal-actions {
            display: flex;
            justify-content: flex-end; /* 將內容推到最右邊 */
            gap: 10px; /* 兩個按鈕的間距 */
            margin-top: 20px;
        }

        .modal-actions button {
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            border: none;
        }

        .cancel-btn {
            background-color: #3f3f3f;
            color: white;
        }

        .cancel-btn:hover {
            background-color: #5f5f5f;
        }

        .submit-btn {
            background-color: #3fbf3f;
            color: white;
        }

        .submit-btn:hover {
            background-color: #7fbf7f;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>MLB9局職棒-球員訓練</h1>

        <div class="row">
            <label>球隊: </label>
            <select id="team-select">
                <option value="">請選擇球隊...</option>
                <option value="NYY">NYY</option>
                <option value="ATH">ATH</option>
                <option value="HOU">HOU</option>
                <option value="WSH">WSH</option>
                <option value="STL">STL</option>
                <option value="LAD">LAD</option>
                <option value="SD">SD</option>
            </select>

            <label>類型: </label>
            <select id="type-select">
                <option value="regular">一般</option>
                <option value="vintage">經典</option>
                <option value="prime">全盛</option>
                <option value="signature">簽名</option>
                <option value="legend">傳說</option>
                <option value="supreme">史詩</option>
            </select>

            <label>位置: </label>
            <select id="position-select"> 
                <option value="">請選擇位置...</option>
                <optgroup label="打者">
                    <option value="C">C</option>
                    <option value="1B">1B</option>
                    <option value="2B">2B</option>
                    <option value="3B">3B</option>
                    <option value="SS">SS</option>
                    <option value="OF">OF</option>
                    <option value="DH">DH</option>
                </optgroup> 
                <optgroup label="投手">
                    <option value="SP">SP</option>
                    <option value="RP">RP</option>
                    <option value="CP">CP</option>
                </optgroup> 
            </select>
        </div>

        <table>
            <colgroup>
                <col style="width: 12%;"> <col style="width: 34%;"> <col style="width: 18%;"> <col style="width: 18%;"> <col style="width: 18%;"> </colgroup>
            <thead>
                <tr>
                    <th>階級</th>
                    <th>球員</th>
                    <th><input type="checkbox" checked>指導球員</th>
                    <th><input type="checkbox" checked>黑鑽</th>
                    <th><input type="checkbox" checked>團隊加成</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <select>
                            <option value="diamond">白金</option>
                            <option value="blackDiamond" selected>黑鑽</option>
                        </select>
                    </td>
                    <td>
                        <select>
                            <option value="">請選擇球員...</option>
                            <option value="playerA">球員A</option>
                        </select>
                    </td>
                    <td>
                        <select>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                        </select>
                    </td>
                    <td>
                        <input type="number" min="0" value="0">
                    </td>
                    <td>
                        <input type="number" min="0" value="0">
                    </td>
                </tr>
            </tbody>
        </table>
        
        <table>
            <colgroup>
                <col style="width: 6%;"> <col style="width: 16%;"> 
                <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> 
                <col style="width: 13%;"> </colgroup>
            <thead>
                <tr>
                    <th><input type="checkbox" title="全選" checked></th>
                    <th>項目</th>
                    <th>接觸</th>
                    <th>力量</th>
                    <th>選球</th>
                    <th>速度</th>
                    <th>守備</th>
                    <th>值</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="2">基本能力值</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>0</td>
                </tr>
                <tr>
                    <td><input type="checkbox" checked></td>
                    <td>基本校正</td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td></td>
                </tr>
                <tr>
                    <td colspan="2">階級上升量</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>0</td>
                </tr>
                <tr>
                    <td><input type="checkbox" checked></td>
                    <td>強化量</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>0</td>
                </tr>
                <tr>
                    <td colspan="2">基本+階級+強化</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr>
                    <td><input type="checkbox" checked></td>
                    <td>教練</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>0</td>
                </tr>
                <tr>
                    <td><input type="checkbox" checked></td>
                    <td>特別訓練</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>
                        <select>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10" selected>10</option>
                        </select>
                    </td>
                </tr>
                <tr class="summary-row">
                    <td colspan="2">一般陣容能力值</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                
                <tr class="spacer-row">
                    <td colspan="8"></td>
                </tr>

                <tr>
                    <td><input type="checkbox" checked></td>
                    <td>狀態</td>
                    <td><input type="number" min="-3" value="0"></td>
                    <td><input type="number" min="-3" value="0"></td>
                    <td><input type="number" min="-3" value="0"></td>
                    <td><input type="number" min="-3" value="0"></td>
                    <td><input type="number" min="-3" value="0"></td>
                    <td>
                        <select>
                            <option value="-3">-3</option>
                            <option value="0" selected>0</option>
                            <option value="3">3</option>
                            <option value="6">6</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><input type="checkbox" checked></td>
                    <td>裝備</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>
                        <select>
                            <option value="0" selected>無</option>
                            <option value="1">銅</option>
                            <option value="2">銀</option>
                            <option value="3">金</option>
                            <option value="5">白</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><input type="checkbox" checked></td>
                    <td>技能</td>
                    <td><input type="number" value="0"></td>
                    <td><input type="number" value="0"></td>
                    <td><input type="number" value="0"></td>
                    <td><input type="number" value="0"></td>
                    <td><input type="number" value="0"></td>

                        <button class="setting-btn">設定</button>
                    </td>

                <tr class="summary-row">
                    <td colspan="2">最高登板能力值</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
            </tbody>
        </table>

    </div>

    <div class="modal-overlay">
        <div class="modal-content">
            <h2>技能設定</h2>
            
            <table>
                <colgroup>
                <col style="width: 6%;"> <col style="width: 16%;"> 
                <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> 
                <col style="width: 13%;"> </colgroup>
                <thead>
                    <tr>
                        <th><input type="checkbox" title="全選" checked></th>
                        <th>項目</th>

                        <th>力量</th>
                        <th>選球</th>
                        <th>速度</th>
                        <th>守備</th>
                        <th>值</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th><input type="checkbox" checked></th>

                        <td><input type="number" value="0"></td>

            <div class="modal-actions">

</body>
</html>
