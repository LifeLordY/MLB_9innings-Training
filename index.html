<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MLB9局職棒-球員訓練</title>

    <style>
        /* --- 1. 網頁背景設定 --- */
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- 2. 固定大小、圓角的長方形主容器 --- */
        .container {
            width: 600px; /* 稍微加寬一點，讓兩個表格的內容有更充裕的顯示空間 */
            min-height: 600px; 
            background-color: #1f1f1f; 
            border-radius: 20px; 
            margin: 20px auto; 
            padding: 20px;
            box-sizing: border-box; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
        }

        /* --- 3. 標題設定 --- */
        h1 {
            text-align: center; 
            margin-top: 0;
            margin-bottom: 20px; 
            color: #ffffff;
            font-size: 32px;
        }

        /* --- 4. 嚴格不換排的橫排設定 (用於選項) --- */
        .row {
            display: flex; 
            flex-wrap: nowrap; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            background-color: #3f3f3f; 
            padding: 10px;
            border-radius: 10px;
        }

        /* --- 5. 文字標籤與下拉選單樣式 --- */
        label {
            font-size: 16px;
            font-weight: bold;
        }

        /* 針對上方獨立選項列的選單 */
        .row select {
            padding: 8px 10px;
            font-size: 14px;
            border-radius: 5px;
            border: 2px solid #3f3f3f;
            background-color: #1f1f1f;
            color: white;
            cursor: pointer;
            outline: none;
        }

        .row select:focus {
            border-color: #ffffff;
        }

        /* --- 6. 數據表格樣式 --- */
        table {
            width: 100%; 
            margin-top: 20px; 
            border-collapse: collapse; 
            border-radius: 0; 
            background-color: #1f1f1f;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid #7f7f7f; 
            padding: 10px; 
            text-align: center; 
            vertical-align: middle; /* 讓內容垂直置中 */
        }

        th {
            background-color: #00001f; 
            color: #ffffff;
            font-weight: bold;
        }

        /* --- 7. 表格內部專用元件樣式 (新增) --- */
        
        /* 讓表格內的選單和數字輸入框自動填滿，並符合深色主題 */
        table select, table input[type="number"] {
            width: 100%;
            padding: 5px;
            font-size: 14px;
            border-radius: 3px;
            border: 1px solid #3f3f3f;
            background-color: #1f1f1f;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        table select:focus, table input[type="number"]:focus {
            border-color: #ffffff;
        }

        /* 稍微放大勾選框，讓游標移上去會變成手指圖案 */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>MLB9局職棒-球員訓練</h1>

        <div class="row">
            <label>球隊: </label>
            <select id="team-select">
                <option value="">請選擇球隊...</option>
                <option value="NYY">NYY</option>
                <option value="ATH">ATH</option>
                <option value="HOU">HOU</option>
                <option value="WSH">WSH</option>
                <option value="STL">STL</option>
                <option value="LAD">LAD</option>
                <option value="SD">SD</option>
            </select>

            <label>類型: </label>
            <select id="type-select">
                <option value="regular">一般</option>
                <option value="vintage">經典</option>
                <option value="prime">全盛</option>
                <option value="signature">簽名</option>
                <option value="legend">傳說</option>
                <option value="supreme">史詩</option>
            </select>

            <label>位置: </label>
            <select id="position-select"> 
                <option value="">請選擇位置...</option>
                <optgroup label="打者">
                    <option value="C">C</option>
                    <option value="1B">1B</option>
                    <option value="2B">2B</option>
                    <option value="3B">3B</option>
                    <option value="SS">SS</option>
                    <option value="OF">OF</option>
                    <option value="DH">DH</option>
                </optgroup> 
                <optgroup label="投手">
                    <option value="SP">SP</option>
                    <option value="RP">RP</option>
                    <option value="CP">CP</option>
                </optgroup> 
            </select>
        </div>

        <table>
            <colgroup>
                <col style="width: 15%;"> <col style="width: 25%;"> <col style="width: 20%;"> <col style="width: 20%;"> <col style="width: 20%;"> </colgroup>
            <thead>
                <tr>
                    <th>階級</th>
                    <th>球員</th>
                    <th><input type="checkbox">指導球員</th>
                    <th><input type="checkbox">黑鑽</th>
                    <th><input type="checkbox">團隊加成</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <select>
                            <option value="diamond">白金</option>
                            <option value="blackDiamond" selected>黑鑽</option>
                        </select>
                    </td>
                    <td>
                        <select>
                            <option value="">請選擇球員...</option>
                            <option value="playerA">球員A</option>
                        </select>
                    </td>
                    <td>
                        <select>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                        </select>
                    </td>
                    <td>
                        <input type="number" min="0" value="0">
                    </td>
                    <td>
                        <input type="number" min="0" value="0">
                    </td>
                </tr>
            </tbody>
        </table>
        
        <table>
            <colgroup>
                <col style="width: 5%;"> <col style="width: 20%;"> 
                <col style="width: 12%;"> <col style="width: 12%;"> <col style="width: 12%;"> <col style="width: 12%;"> <col style="width: 12%;"> 
                <col style="width: 15%;"> </colgroup>
            <thead>
                <tr>
                    <th><input type="checkbox" title="全選"></th>
                    <th>項目</th>
                    <th>接觸</th>
                    <th>力量</th>
                    <th>選球</th>
                    <th>速度</th>
                    <th>守備</th>
                    <th>值</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="2">基本能力值</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>0</td>
                </tr>
                <tr>
                    <td><input type="checkbox"></td>
                    <td>基本校正</td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                </tr>
            </tbody>
        </table>

    </div>

</body>
</html>
