<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB9局職棒-球員訓練</title>
    <meta name="description" content="這是一個為 MLB9innings 玩家打造的網站，旨在幫助玩家計算出合適的強化量與教練分配，歡迎多加利用～">
    <meta property="og:description" content="這是一個為 MLB9innings 玩家打造的網站，旨在幫助玩家計算出合適的強化量與教練分配，歡迎多加利用～">

    <link rel="icon" href="images/icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="capture-container" class="container">
        
        <h1>MLB9局職棒-球員訓練</h1>

        <div class="row">
            <label>球隊: </label>
            <select id="team-select">
                <option value="">請選擇球隊...</option>
            </select>

            <label>類型: </label>
            <select id="type-select">
                <option value="regular">一般</option>
                <option value="vintage">經典</option>
                <option value="prime">全盛</option>
                <option value="signature">簽名</option>
                <option value="legend">傳說</option>
                <option value="supreme">史詩</option>
            </select>

            <label>位置: </label>
            <select id="position-select"> 
                <option value="">請選擇位置...</option>
                <optgroup label="打者">
                    <option value="C">C</option>
                    <option value="1B">1B</option>
                    <option value="2B">2B</option>
                    <option value="3B">3B</option>
                    <option value="SS">SS</option>
                    <option value="OF">OF</option>
                    <option value="DH">DH</option>
                </optgroup> 
                <optgroup label="投手">
                    <option value="SP">SP</option>
                    <option value="RP">RP</option>
                    <option value="CP">CP</option>
                </optgroup> 
            </select>
        </div>

        <table>
            <colgroup>
                <col style="width: 12%;"> <col style="width: 34%;"> <col style="width: 18%;"> <col style="width: 18%;"> <col style="width: 18%;"> </colgroup>
            <thead>
                <tr>
                    <th>階級</th>
                    <th>球員</th>
                    <th><input type="checkbox" checked>指導球員</th>
                    <th><input type="checkbox" checked>黑鑽</th>
                    <th><input type="checkbox" checked>團隊加成</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <select>
                            <option value="diamond">白金</option>
                            <option value="blackDiamond" selected>黑鑽</option>
                        </select>
                    </td>
                    <td>
                        <select id="player-select">
                            <option value="">請選擇球員...</option>
                        </select>
                    </td>
                    <td>
                        <select>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                        </select>
                    </td>
                    <td>
                        <input type="number" min="0" value="0">
                    </td>
                    <td>
                        <input type="number" min="0" value="0">
                    </td>
                </tr>
            </tbody>
        </table>
        
        <table>
            <colgroup>
                <col style="width: 6%;"> <col style="width: 16%;"> 
                <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> 
                <col style="width: 13%;"> </colgroup>
            <thead>
                <tr>
                    <th><input type="checkbox" title="全選" checked></th>
                    <th>項目</th>
                    <th>接觸</th>
                    <th>力量</th>
                    <th>選球</th>
                    <th>速度</th>
                    <th>守備</th>
                    <th>值</th>
                </tr>
            </thead>
            <tbody>
                <tr class="bold-row rule-large">
                    <td colspan="2">基本能力值</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>0</td>
                </tr>
                <tr class="rule-posneg">
                    <td><input type="checkbox" checked></td>
                    <td>基本校正</td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td><input type="number" min="-5" max="5" value="0"></td>
                    <td></td>
                </tr>
                <tr class="bold-row rule-small">
                    <td colspan="2">階級上升量</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>0</td>
                </tr>
                <tr class="rule-small">
                    <td><input type="checkbox" checked></td>
                    <td>強化量</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>0</td>
                </tr>
                <tr class="rule-large">
                    <td colspan="2">基本+階級+強化</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr class="rule-small">
                    <td><input type="checkbox" checked></td>
                    <td>特別訓練</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>
                        <select class="no-color">
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10" selected>10</option>
                        </select>
                    </td>
                </tr>
                <tr class="rule-small">
                    <td><input type="checkbox" checked></td>
                    <td>教練</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>0</td>
                </tr>
                <tr class="summary-row rule-large">
                    <td colspan="2">一般陣容能力值</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                
                <tr class="spacer-row">
                    <td colspan="8"></td>
                </tr>

                <tr class="rule-posneg">
                    <td><input type="checkbox" checked></td>
                    <td>狀態</td>
                    <td><input type="number" min="-3" value="0"></td>
                    <td><input type="number" min="-3" value="0"></td>
                    <td><input type="number" min="-3" value="0"></td>
                    <td><input type="number" min="-3" value="0"></td>
                    <td><input type="number" min="-3" value="0"></td>
                    <td>
                        <select>
                            <option value="-3" style="color: #ff0000;">-3</option>
                            <option value="0" selected style="color: #ffffff;">0</option>
                            <option value="3" style="color: #00ff00;">3</option>
                            <option value="6" style="color: #00ff00;">6</option>
                        </select>
                    </td>
                </tr>
                <tr class="rule-posneg">
                    <td><input type="checkbox" checked></td>
                    <td>裝備</td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td><input type="number" min="0" value="0"></td>
                    <td>
                        <select class="no-color">
                            <option value="0" selected>無</option>
                            <option value="1">銅</option>
                            <option value="2">銀</option>
                            <option value="3">金</option>
                            <option value="5">白</option>
                        </select>
                    </td>
                </tr>
                <tr class="rule-small">
                    <td><input type="checkbox" checked></td>
                    <td>技能</td>
                    <td><input type="number" value="0"></td>
                    <td><input type="number" value="0"></td>
                    <td><input type="number" value="0"></td>
                    <td><input type="number" value="0"></td>
                    <td><input type="number" value="0"></td>
                    <td>
                        <button class="setting-btn">設定</button>
                    </td>
                </tr>
                <tr class="summary-row rule-large">
                    <td colspan="2">最高登板能力值</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
            </tbody>
        </table>

    </div>

    <div class="modal-overlay">
        <div class="modal-content">
            <h2>技能設定</h2>
            
            <table>
                <colgroup>
                <!-- <col style="width: 6%;"> <col style="width: 16%;"> 
                <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> <col style="width: 13%;"> 
                <col style="width: 13%;"> </colgroup> -->
                <col style="width: 36px;"> <col style="width: 96px;"> 
                <col style="width: 78px;"> <col style="width: 78px;"> <col style="width: 78px;"> <col style="width: 78px;"> <col style="width: 78px;"> 
                <col style="width: 78px;"> </colgroup>
                <thead>
                    <tr>
                        <th><input type="checkbox" title="全選" checked></th>
                        <th>項目</th>
                        <th>接觸</th>
                        <th>力量</th>
                        <th>選球</th>
                        <th>速度</th>
                        <th>守備</th>
                        <th>設定</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="checkbox" checked></th>
                        <td>默契</td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td>
                            <select>
                                <option value="none">無</option>
                                <option value="regular" selected>一般</option>
                                <option value="legend">傳說</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><input type="checkbox" checked></th>
                        <td>技能1</td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><button class="reset-row-btn">歸零</button></td>
                    </tr>
                    <tr>
                        <td><input type="checkbox" checked></th>
                        <td>技能2</td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><button class="reset-row-btn">歸零</button></td>
                    </tr>
                    <tr>
                        <td><input type="checkbox" checked></th>
                        <td>技能3</td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><button class="reset-row-btn">歸零</button></td>
                    </tr>
                    <tr>
                        <td><input type="checkbox" checked></th>
                        <td>其他</td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><input type="number" value="0"></td>
                        <td><button class="reset-row-btn">歸零</button></td>
                    </tr>
                </tbody>
            </table>

            <div class="modal-actions">
                <button class="cancel-btn">取消</button>
                <button class="submit-btn">完成</button>
            </div>
        </div>
    </div>

    <div style="display: flex; justify-content: center;">
        <button id="copy-btn" style="background-color: #3f3f3f; color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-size: 14px;">
            擷取畫面到剪貼簿
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/2.9.5/dom-to-image-more.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
